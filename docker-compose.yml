services:
  backend:
    build: ./backend
    container_name: aura-backend
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=https://88.223.94.178
    volumes:
      - ./openwake:/openwake:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.aura-api.rule=Host(`88.223.94.178`) && PathPrefix(`/api`)
      - traefik.http.routers.aura-api.entrypoints=websecure
      - traefik.http.routers.aura-api.tls=true
      - traefik.http.routers.aura-api.priority=10
      - traefik.http.services.aura-api.loadbalancer.server.port=8000
    networks:
      - root_default
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: https://88.223.94.178
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${NEXT_PUBLIC_MICROSOFT_CLIENT_ID:-}
        NEXT_PUBLIC_HUBSPOT_CLIENT_ID: ${NEXT_PUBLIC_HUBSPOT_CLIENT_ID:-}
        NEXT_PUBLIC_SLACK_CLIENT_ID: ${NEXT_PUBLIC_SLACK_CLIENT_ID:-}
    container_name: aura-frontend
    labels:
      - traefik.enable=true
      - traefik.http.routers.aura-front.rule=Host(`88.223.94.178`)
      - traefik.http.routers.aura-front.entrypoints=websecure
      - traefik.http.routers.aura-front.tls=true
      - traefik.http.routers.aura-front.priority=1
      - traefik.http.services.aura-front.loadbalancer.server.port=3000
    networks:
      - root_default
    restart: unless-stopped

networks:
  root_default:
    external: true
