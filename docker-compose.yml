services:
  nginx:
    image: nginx:alpine
    container_name: aura-nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: aura-backend
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=https://88.223.94.178,https://localhost
    volumes:
      - ./openwake:/openwake:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: https://88.223.94.178
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${NEXT_PUBLIC_MICROSOFT_CLIENT_ID:-}
        NEXT_PUBLIC_HUBSPOT_CLIENT_ID: ${NEXT_PUBLIC_HUBSPOT_CLIENT_ID:-}
        NEXT_PUBLIC_SLACK_CLIENT_ID: ${NEXT_PUBLIC_SLACK_CLIENT_ID:-}
    container_name: aura-frontend
    restart: unless-stopped
