services:
  backend:
    build: ./backend
    container_name: aura-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://${SERVER_IP:-localhost}:3000
    volumes:
      - ./openwake:/openwake:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: http://${SERVER_IP:-localhost}:8000
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${NEXT_PUBLIC_MICROSOFT_CLIENT_ID:-}
        NEXT_PUBLIC_HUBSPOT_CLIENT_ID: ${NEXT_PUBLIC_HUBSPOT_CLIENT_ID:-}
        NEXT_PUBLIC_SLACK_CLIENT_ID: ${NEXT_PUBLIC_SLACK_CLIENT_ID:-}
    container_name: aura-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
