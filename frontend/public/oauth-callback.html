<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>AURA — Connexion</title>
  <style>
    body {
      background: #faf6f1;
      color: #1a1a1a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .status {
      text-align: center;
      font-size: 15px;
      color: #6b6560;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #ddd6cc;
      border-top-color: #e36b2b;
      border-right-color: #f08c42;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #d44040; }
    .success { color: #2d9e6a; }
  </style>
</head>
<body>
  <div class="status" id="status">
    <div class="spinner"></div>
    <p>Connexion en cours...</p>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var state = params.get('state');
      var error = params.get('error');
      var statusEl = document.getElementById('status');

      if (error) {
        statusEl.innerHTML = '<p class="error">Erreur : ' + error + '</p><p>Vous pouvez fermer cette fenetre.</p>';
        return;
      }

      if (!code || !state) {
        statusEl.innerHTML = '<p class="error">Parametres manquants.</p><p>Vous pouvez fermer cette fenetre.</p>';
        return;
      }

      var sent = false;

      if (window.opener) {
        try {
          window.opener.postMessage(
            { type: 'oauth-callback', provider: state, code: code },
            window.location.origin
          );
          sent = true;
        } catch (e) {
          console.warn('postMessage failed:', e);
        }
      }

      if (!sent) {
        localStorage.setItem('oauth-callback', JSON.stringify({
          type: 'oauth-callback',
          provider: state,
          code: code,
          timestamp: Date.now()
        }));
        sent = true;
      }

      if (sent) {
        statusEl.innerHTML = '<p class="success">Connecte ! Cette fenetre va se fermer...</p>';
        setTimeout(function() { window.close(); }, 1500);
      } else {
        statusEl.innerHTML = '<p class="error">Fenetre parente introuvable. Veuillez reessayer.</p>';
      }
    })();
  </script>
</body>
</html>
